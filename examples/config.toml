# Example `config.toml` (machine-local).
# Default location: `$XDG_CONFIG_HOME/wau/config.toml` (fallback `~/.config/wau/config.toml`).
# Override at runtime with `--config <path>`.

# Config format version for forward-compatible parsing.
schema = 1

# Default install context when a command omits `--tag`.
[defaults]
flavor = "retail"
channel = "stable"
install_tag = "retail-main"

# Default tracing verbosity. Priority (highest wins): RUST_LOG env > --verbose > --quiet > this value.
# Valid values: trace, debug, info, warn, error.
[logging]
level = "info"

# Global cache: downloads, staging, local provider metadata cache.
[paths]
cache = "~/.cache/wau"

# Multiple WoW roots: same base `flavor` may appear more than once; `tag` disambiguates
# (private server, second retail copy, etc.).
[[paths.installs]]
tag = "retail-main"
flavor = "retail"
wow_root = "/games/World of Warcraft"

[[paths.installs]]
tag = "classic-official"
flavor = "classic-era"
wow_root = "/games/World of Warcraft"

[[paths.installs]]
tag = "classic-turtle"
# Illustrative: third-party / custom client; still a `flavor` id the resolver understands for API
# metadata, but paths are yours.
flavor = "classic-era"
wow_root = "/games/TurtleWoW/World of Warcraft"

[providers.curseforge]
# How to obtain your CurseForge API key:
#   1. Go to https://console.curseforge.com and sign in (or create an account).
#   2. In the left sidebar, click "API Keys".
#   3. Click "Generate API Key", give it a name (e.g. "wau"), and confirm.
#   4. Copy the generated key and paste it below.
# Keep this file out of version control — treat the key as a secret.
api_key = "your-curseforge-api-key"

[providers.github]
# Optional personal access token. Omit this section entirely to use the unauthenticated API
# (60 req/h rate limit). With a token the limit rises to 5000 req/h.
# token = "ghp_yourPersonalAccessToken"
